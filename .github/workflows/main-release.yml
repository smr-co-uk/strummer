name: Main Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-check-release:
    name: Build, test, check, and release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_path: target/release/strum2midi
          - name: macos-x86_64
            os: macos-15-intel
            artifact_path: target/release/strum2midi
          - name: macos-arm64
            os: macos-latest
            artifact_path: target/release/strum2midi
          - name: windows-x86_64
            os: windows-latest
            artifact_path: target/release/strum2midi.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: strum2midi-${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
